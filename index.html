<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mohd Alqama Shaikh — Robotics &amp; Embedded Systems</title>
  <meta name="description" content="Mohd Alqama Shaikh — robotics & embedded systems engineer. A minimal, terminal-driven portfolio: legged robots, aerial platforms, manipulation, and human-robot interaction." />
  <meta name="author" content="Mohd Alqama Shaikh" />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="./favicon.jpeg" type="image/jpeg" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mohd Alqama Shaikh — Robotics & Embedded Systems" />
  <meta property="og:description" content="A minimal, terminal-driven portfolio. Open pages with ./pagename or just click." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    html[data-theme="light"] {
      --bg: #f4f1ea;
      --panel: #fbf9f4;
      --ink: #18181b;
      --muted: #6b6b73;
      --line: #18181b;
      --line-soft: #d8d2c4;
      --accent: #18181b;
      --bar: #ece7db;
      --tag: #ece7db;
      --sel: #d9d2c0;
    }
    html[data-theme="dark"] {
      --bg: #0c0c0d;
      --panel: #111113;
      --ink: #e7e7e2;
      --muted: #8b8b86;
      --line: #2a2a2e;
      --line-soft: #1d1d20;
      --accent: #e7e7e2;
      --bar: #161618;
      --tag: #1a1a1d;
      --sel: #2a2a2e;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0.1px;
      overflow-wrap: break-word;
    }
    ::selection { background: var(--sel); }
    a { color: var(--ink); }
    code { font-family: var(--mono); background: var(--tag); padding: 0 4px; border: 1px solid var(--line-soft); overflow-wrap: anywhere; }
    /* long URLs / tokens must never force horizontal scroll, but normal text
       still wraps at word boundaries (overflow-wrap only breaks unbreakable runs) */
    .tline, .cmd-text, .li-sum, .li-title, .boxx-label, .xlink, .ilink, .cmddesc, .c-name { overflow-wrap: anywhere; }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 18px 40px;
      padding-left: max(18px, env(safe-area-inset-left));
      padding-right: max(18px, env(safe-area-inset-right));
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* topbar */
    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }
    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand b { font-weight: 600; letter-spacing: 1px; }
    .brand small { color: var(--muted); }
    .theme-btn {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 0;
    }
    .theme-btn:hover { background: var(--bar); }

    /* nav chips */
    .nav { display: flex; flex-wrap: wrap; gap: 8px; }
    .nav a {
      text-decoration: none;
      font-size: 13px;
      padding: 4px 10px;
      border: 1px solid var(--line-soft);
      background: var(--panel);
      color: var(--ink);
    }
    .nav a:hover { border-color: var(--line); background: var(--bar); }

    /* terminal */
    .terminal {
      border: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      height: 74vh;
      min-height: 420px;
    }
    .term-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--bar);
      font-size: 13px;
      color: var(--muted);
    }
    .dots { display: flex; gap: 6px; }
    .dots i { width: 9px; height: 9px; display: block; border: 1px solid var(--line); }
    .term-body {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 16px;
      scroll-behavior: smooth;
    }
    .term-input {
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      background: var(--bar);
    }
    .term-input .ps1 { color: var(--muted); white-space: nowrap; }
    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 15px;
      caret-color: var(--ink);
    }

    /* scrollback blocks */
    .block { margin-bottom: 14px; }
    .echo { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .ps1 { color: var(--muted); }
    .cmd-text { color: var(--ink); }
    .tline { margin: 0 0 9px; }
    .tline.muted, .muted { color: var(--muted); }
    .tline.err, .err { color: var(--ink); border-left: 2px solid var(--line); padding-left: 8px; }
    .tline.lead { color: var(--ink); }

    .banner { margin-bottom: 18px; }
    .ascii {
      margin: 0 0 4px;
      font-weight: 600;
      letter-spacing: 2px;
      font-size: clamp(15px, 4.4vw, 22px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* boxes */
    .boxx { border: 1px solid var(--line); margin: 0 0 14px; background: var(--panel); }
    .boxx-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--bar);
      font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    }
    .boxx-dot { width: 8px; height: 8px; border: 1px solid var(--line); display: block; }
    .boxx-body { padding: 14px; }

    .title { margin: 0 0 2px; font-size: 19px; font-weight: 600; }
    .subtitle { margin: 0 0 12px; color: var(--muted); }
    .proj-head, .li-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .li-meta { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .rule { border: none; border-top: 1px solid var(--line-soft); margin: 12px 0; }

    /* links */
    .ilink, .xlink, .li-title { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
    .ilink:hover, .xlink:hover { background: var(--tag); }
    .li-title { border-bottom: none; font-weight: 600; }

    /* command list (readme) */
    .cmdlist { margin-top: 12px; display: grid; gap: 4px; }
    .cmdrow { display: flex; gap: 14px; align-items: baseline; }
    .cmdrow .ilink { min-width: 150px; display: inline-block; }
    .cmddesc { color: var(--muted); }

    /* lists */
    .list { display: grid; gap: 4px; }
    .list-item { border-top: 1px solid var(--line-soft); padding: 12px 0; }
    .list-item:first-child { border-top: none; }
    .li-sum { margin: 6px 0 8px; }
    .ls { display: flex; flex-wrap: wrap; gap: 10px; }

    /* tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--line-soft); padding: 2px 8px; background: var(--bg);
    }

    /* key-value */
    .kv { display: grid; grid-template-columns: max-content 1fr; gap: 4px 18px; margin: 14px 0 0; }
    .kv dt { color: var(--muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
    .kv dd { margin: 0; }

    /* media */
    .media { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .frame { margin: 0; border: 1px solid var(--line); background: var(--bg); }
    .frame img { display: block; width: 100%; height: 200px; object-fit: cover; }
    .frame figcaption { font-size: 12px; color: var(--muted); padding: 6px 8px; border-top: 1px solid var(--line-soft); }

    /* contact */
    .contacts { display: grid; gap: 8px; margin-top: 8px; }
    .contact-row { display: flex; gap: 12px; align-items: baseline; }
    .c-no { color: var(--muted); }
    .c-name { min-width: 90px; color: var(--muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
    .linklist { display: grid; gap: 8px; }

    .tline.ok2 { color: var(--ink); font-weight: 600; }
    .authhint code { font-size: 12px; }

    /* inline password / token prompt */
    .authform {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      border: 1px solid var(--line); background: var(--bg); padding: 8px 10px; margin: 2px 0 12px;
    }
    .authlabel { color: var(--muted); }
    .authinput {
      flex: 1; min-width: 160px; background: var(--panel); color: var(--ink);
      border: 1px solid var(--line-soft); font-family: var(--mono); font-size: 14px;
      padding: 5px 8px; outline: none; border-radius: 0;
    }
    .authinput:focus { border-color: var(--line); }
    .authbtn {
      font-family: var(--mono); font-size: 13px; color: var(--ink); background: var(--panel);
      border: 1px solid var(--line); padding: 5px 12px; cursor: pointer; border-radius: 0;
    }
    .authbtn:hover { background: var(--bar); }

    /* editor */
    .editor { border: 1px solid var(--line); background: var(--panel); margin: 0 0 14px; }
    .editor-body { padding: 14px; display: grid; gap: 10px; }
    .erow { display: grid; gap: 4px; }
    .elabel { color: var(--muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
    .einput, .etext {
      background: var(--bg); color: var(--ink); border: 1px solid var(--line-soft);
      font-family: var(--mono); font-size: 14px; padding: 7px 9px; outline: none;
      border-radius: 0; width: 100%; resize: vertical;
    }
    .einput:focus, .etext:focus { border-color: var(--line); }
    .einput[readonly] { color: var(--muted); background: var(--bar); }
    .etext.ebig { line-height: 1.6; }
    .ebtns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
    .ecommit { font-weight: 600; }

    footer { color: var(--muted); font-size: 12px; text-align: center; padding-top: 4px; }
    #cmd { scroll-margin-bottom: 24px; }

    /* ---------- mobile / touch ---------- */
    @media (max-width: 640px) {
      .wrap {
        /* fill the visible viewport so the terminal feels like a real app */
        min-height: 100vh;
        min-height: 100dvh;
        padding: 14px 14px 0;
        padding-left: max(14px, env(safe-area-inset-left));
        padding-right: max(14px, env(safe-area-inset-right));
        padding-top: max(14px, env(safe-area-inset-top));
        gap: 10px;
      }
      body { font-size: 14px; }

      .topbar { padding-bottom: 8px; }
      .brand b { letter-spacing: 0.5px; }
      .theme-btn { padding: 8px 12px; }

      /* nav: wrap so every page is visible (no cut-off chips) */
      .nav { gap: 6px; }
      .nav a { flex: 1 1 auto; text-align: center; padding: 8px 10px; }

      /* terminal grows to fill the rest of the screen */
      .terminal { flex: 1 1 auto; height: auto; min-height: 280px; }
      .term-head { padding: 9px 12px; }
      .term-body { padding: 14px 13px; }
      .term-input {
        padding: 11px 13px;
        padding-bottom: max(11px, env(safe-area-inset-bottom));
      }

      /* 16px = iOS won't zoom the page when a field gains focus */
      #cmd, .authinput, .einput, .etext { font-size: 16px; }

      .boxx-body { padding: 13px 12px; }
      .title { font-size: 18px; }

      .cmdrow { flex-direction: column; gap: 0; margin-bottom: 6px; }
      .cmdrow .ilink { min-width: 0; }

      /* stack label/value pairs so nothing gets squeezed */
      .kv { grid-template-columns: 1fr; gap: 1px 0; }
      .kv dd { margin: 0 0 8px; }
      .contact-row { flex-wrap: wrap; gap: 2px 10px; }
      .c-name { min-width: 0; }

      .media { grid-template-columns: 1fr; gap: 10px; }
      .frame img { height: 220px; }

      /* comfortable touch targets without changing the look */
      .nav a, .ilink, .xlink, .theme-btn, .authbtn { touch-action: manipulation; }

      footer { padding: 12px 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
    }

    @media (max-width: 380px) {
      .wrap { padding-left: max(11px, env(safe-area-inset-left)); padding-right: max(11px, env(safe-area-inset-right)); }
      .proj-head, .li-head { gap: 2px 8px; }
      .ascii { letter-spacing: 1px; }
    }

    @media (hover: none) {
      /* on touch devices, hover styles shouldn't "stick" after a tap */
      .nav a:hover, .ilink:hover, .xlink:hover, .theme-btn:hover, .authbtn:hover { background: var(--panel); }
      .ilink:active, .xlink:active, .nav a:active { background: var(--tag); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <b>MOHD ALQAMA SHAIKH</b>
        <small>robotics &amp; embedded systems</small>
      </div>
      <button id="themeBtn" class="theme-btn" type="button">[ dark ]</button>
    </header>

    <nav class="nav" aria-label="pages">
      <a href="#about">./about</a>
      <a href="#projects">./projects</a>
      <a href="#blogs">./blogs</a>
      <a href="#publications">./publications</a>
      <a href="#contact">./contact</a>
      <a href="#">./home</a>
    </nav>

    <main class="terminal" id="terminal">
      <div class="term-head">
        <span class="dots"><i></i><i></i><i></i></span>
        <span>bash — guest@aPR0T0: ~</span>
      </div>
      <div class="term-body" id="out" aria-live="polite"></div>
      <form class="term-input" id="form" autocomplete="off" onsubmit="return false">
        <span class="ps1">guest@aPR0T0:~$</span>
        <input id="cmd" type="text" spellcheck="false" autocapitalize="off"
               autocomplete="off" aria-label="terminal command input" />
      </form>
    </main>

    <footer>
      <span id="yr"></span> · built in the open · type <code>help</code>
    </footer>
  </div>

  <script>document.getElementById("yr").textContent = "© " + new Date().getFullYear() + " M. A. Shaikh";</script>
  <script src="./posts.js"></script>
  <script src="./content.js"></script>
  <script src="./app.js"></script>
  <script src="./author.js"></script>
</body>
</html>
